<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backstory</title>
  <style>
    * { box-sizing: border-box; }
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background-color: #8c1025; /* Solid Dark Red Background */
      overflow: hidden; 
      font-family: 'Arial Black', Impact, sans-serif; 
    }
    
    /* Student ID Display for Compliance */
    .sid-display {
      position: absolute;
      top: 20px;
      right: 30px;
      color: rgba(255, 255, 255, 0.5); 
      font-size: 1.5vh;
      z-index: 10;
    }

    /* Horizontal stripes hugging the bottom */
    .bg-stripes { 
      position: absolute; 
      bottom: 0; 
      left: 0; 
      width: 100vw; 
      height: 12vh; 
      z-index: 1; 
      display: flex; 
      flex-direction: column; 
    }
    .stripe { width: 100%; flex: 1; }
    .stripe-yellow { background-color: #e6d649; flex: 2.5; }
    .stripe-green { background-color: #179e40; }
    .stripe-blue { background-color: #5eb4cd; }
    .stripe-pink { background-color: #c93f8e; }
    
    /* Navigation buttons sitting above the stripes */
    .nav-buttons { 
      position: absolute; 
      bottom: 16vh; 
      left: 10vw; 
      z-index: 2; 
      display: flex; 
      flex-direction: row; 
      gap: 4vw; 
    }
    
    .nav-buttons a { 
      text-decoration: none; 
      font-size: 3vh; 
      font-weight: 900; 
      letter-spacing: 2px; 
      color: #6eb981; 
      transition: transform 0.1s linear; 
      display: flex; 
      align-items: center; 
    }
    
    /* Green hover box logic */
    .nav-buttons a::before { 
      content: ''; 
      display: inline-block; 
      width: 1.5vh; 
      height: 3vh; 
      background-color: #6eb981; 
      margin-right: 12px; 
      opacity: 0; 
    }
    
    .nav-buttons a:hover { transform: translateY(-5px); }
    .nav-buttons a:hover::before { opacity: 1; }

    /* Content Area */
    .content-area {
      position: absolute;
      top: 15vh;
      left: 10vw;
      width: 80vw;
      color: white;
      z-index: 2;
    }

    h1 {
      font-size: 8vh;
      margin: 0;
      line-height: 0.9;
      color: #e6d649; /* Yellow Title */
      text-transform: uppercase;
      letter-spacing: 2px;
    }

  </style>
</head>
<body>
  
  <div class="sid-display">SID# [YOUR ID HERE]</div>

  <div class="content-area">
    <h1>BACKSTORY</h1>
    </div>

  <div class="bg-stripes">
    <div class="stripe stripe-yellow"></div>
    <div class="stripe stripe-green"></div>
    <div class="stripe stripe-blue"></div>
    <div class="stripe stripe-pink"></div>
  </div>

  <div class="nav-buttons">
    <a href="play.html">PLAY MOVIE</a>
    <a href="index.html">MAIN MENU</a>
  </div>

</body>
</html>
