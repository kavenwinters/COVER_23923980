<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Languages</title>
  <style>
    * { box-sizing: border-box; }
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background-color: #c93f8e; /* Base Pink */
      overflow: hidden; 
      font-family: 'Arial Black', Impact, sans-serif; 
    }
    
    .bg-stripes { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh; 
      z-index: 1; 
    }
    
    .nav-buttons { 
      position: absolute; 
      bottom: 12vh; 
      left: 15vw; 
      z-index: 2; 
      display: flex; 
      flex-direction: column; 
      gap: 1.5vh; 
    }
    
    .nav-buttons a { 
      text-decoration: none; 
      font-size: 3vh; 
      font-weight: 900; 
      letter-spacing: 2px; 
      color: #6eb981; 
      transform: translateX(0); 
      transition: transform 0.1s linear; 
      display: flex; 
      align-items: center; 
    }
    
    .nav-buttons a:hover { transform: translateX(1.5vw); }
  </style>
</head>
<body>
  
  <svg class="bg-stripes" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
    
    <rect width="1000" height="1000" fill="#c93f8e" />

    <rect x="0" y="0" width="450" height="700" fill="#f36c00" />

    <rect x="0" y="700" width="450" height="26" fill="#e6d649" />
    <rect x="0" y="726" width="450" height="26" fill="#179e40" />
    <rect x="0" y="752" width="450" height="26" fill="#5eb4cd" />

    <path d="M 450,0 
             L 880,0 
             L 880,600 
             A 500 500 0 0 1 380,1100 
             L 0,1100 
             L 300,1000 
             L 420,840 
             Q 450,800 450,778 
             L 450,0 Z" 
          fill="#8c1025"/>

    <path d="M 880,0 L 880,600 A 500 500 0 0 1 380,1100" fill="none" stroke="#e6d649" stroke-width="26" />
    <path d="M 906,0 L 906,600 A 526 526 0 0 1 380,1126" fill="none" stroke="#179e40" stroke-width="26" />
    <path d="M 932,0 L 932,600 A 552 552 0 0 1 380,1152" fill="none" stroke="#5eb4cd" stroke-width="26" />

  </svg>

  <div class="nav-buttons">
    <a href="play.html">PLAY MOVIE</a>
    <a href="index.html">MAIN MENU</a>
  </div>

</body>
</html>
