<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Languages</title>
  <style>
    * { box-sizing: border-box; }
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background-color: #c93f8e; /* Base Pink */
      overflow: hidden; 
      font-family: 'Arial Black', Impact, sans-serif; 
    }
    
    .bg-stripes { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh; 
      z-index: 1; 
    }
    
    /* Positioned in the bottom left pink area */
    .nav-buttons { 
      position: absolute; 
      bottom: 12vh; 
      left: 15vw; 
      z-index: 2; 
      display: flex; 
      flex-direction: column; 
      gap: 1.5vh; 
    }
    
    .nav-buttons a { 
      text-decoration: none; 
      font-size: 3vh; 
      font-weight: 900; 
      letter-spacing: 2px; 
      color: #6eb981; 
      transform: translateX(0); 
      transition: transform 0.1s linear; 
      display: flex; 
      align-items: center; 
    }
    
    /* Hover box on the left */
    .nav-buttons a::before { 
      content: ''; 
      display: inline-block; 
      width: 1.5vh; 
      height: 3vh; 
      background-color: #6eb981; 
      margin-right: 12px; 
      opacity: 0; 
    }
    
    .nav-buttons a:hover { transform: translateX(1.5vw); }
    .nav-buttons a:hover::before { opacity: 1; }
  </style>
</head>
<body>
  
  <svg class="bg-stripes" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
    
    <rect width="1000" height="1000" fill="#c93f8e" />

    <rect x="0" y="0" width="460" height="650" fill="#f36c00" />

    <rect x="0" y="650" width="500" height="30" fill="#e6d649" />
    <rect x="0" y="680" width="500" height="30" fill="#179e40" />
    <rect x="0" y="710" width="500" height="30" fill="#5eb4cd" />

    <path d="M 460,0 
             L 830,0 
             L 830,750 
             Q 830,890 695,1000 
             L 300,1000 
             L 460,740 
             L 460,0 Z" 
          fill="#8c1025"/>

    <path d="M 845,0 L 845,750 Q 845,910 715,1000" fill="none" stroke="#e6d649" stroke-width="30" />
    <path d="M 875,0 L 875,750 Q 875,930 735,1000" fill="none" stroke="#179e40" stroke-width="30" />
    <path d="M 905,0 L 905,750 Q 905,950 755,1000" fill="none" stroke="#5eb4cd" stroke-width="30" />

  </svg>

  <div class="nav-buttons">
    <a href="play.html">PLAY MOVIE</a>
    <a href="index.html">MAIN MENU</a>
  </div>

</body>
</html>
