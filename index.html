<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="screen">
    <!-- Bottom visual stack -->
    <section class="stack" aria-hidden="true">
      <svg class="bands" viewBox="0 0 1600 400" preserveAspectRatio="none">
        <!-- We draw ONLY the 4 stripes in this SVG; purple + separator are HTML blocks -->

        <!-- MAROON (thin) -->
        <path d="
          M 0 70
          A 180 180 0 0 1 180 0
          L 1600 0
          L 1600 70
          Z" fill="#8C3E63" />

        <!-- WHITE (medium) -->
        <path d="
          M 0 160
          A 210 210 0 0 1 210 70
          L 1600 70
          L 1600 160
          Z" fill="#D8D4D0" />

        <!-- GREEN (thicker) -->
        <path d="
          M 0 270
          A 250 250 0 0 1 250 160
          L 1600 160
          L 1600 270
          Z" fill="#13978F" />

        <!-- BLUE (thicker) -->
        <path d="
          M 0 400
          A 290 290 0 0 1 290 270
          L 1600 270
          L 1600 400
          Z" fill="#4BA5E8" />
      </svg>

      <!-- thin line between blue and purple like the DVD capture -->
      <div class="separator"></div>

      <!-- purple area -->
      <div class="purple"></div>
    </section>

    <!-- MENU: first 4 items are locked to stripe heights via grid -->
    <nav class="menu" aria-label="DVD Menu">
      <div class="menu-stripes">
        <a class="item play" href="play.html">PLAY MOVIE</a>
        <a class="item lang" href="languages.html">LANGUAGES</a>
        <a class="item scene" href="scenes.html">SCENE SELECTIONS</a>
        <a class="item feat" href="features.html">SPECIAL FEATURES</a>
      </div>

      <!-- PREVIEWS sits in the purple region -->
      <a class="item prev" href="previews.html">PREVIEWS</a>
    </nav>

    <div class="grain" aria-hidden="true"></div>

    <script src="script.js"></script>
  </main>
</body>
</html>
