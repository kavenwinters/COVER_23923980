<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>
  <link rel="stylesheet" href="menu.css?v=11" />
</head>
<body>
  <main class="screen">
    <section class="stack" aria-hidden="true">
      <svg class="art" viewBox="0 0 1600 560" preserveAspectRatio="none">
        <!-- Peach base -->
        <rect x="0" y="0" width="1600" height="560" fill="#D79A8A"/>

        <!-- Band layout (no dancer):
           maroon:  0..70
           gap:     70..84
           white:   84..154
           gap:     154..168
           green:   168..258
           gap:     258..272
           blue:    272..362
           gap:     362..376
           purple:  376..560
        -->

        <!-- Bands FIRST -->
        <!-- MAROON -->
        <path d="
          M 0 70
          L 0 34
          Q 0 0 56 0
          L 1600 0
          L 1600 70
          L 56 70
          Q 0 70 0 34
          Z"
          fill="#8E3E63"
        />

        <!-- WHITE -->
        <path d="
          M 0 154
          L 0 120
          Q 0 84 64 84
          L 1600 84
          L 1600 154
          L 64 154
          Q 0 154 0 120
          Z"
          fill="#D8D4D0"
        />

        <!-- GREEN -->
        <path d="
          M 0 258
          L 0 214
          Q 0 168 78 168
          L 1600 168
          L 1600 258
          L 78 258
          Q 0 258 0 214
          Z"
          fill="#178F86"
        />

        <!-- BLUE -->
        <path d="
          M 0 362
          L 0 318
          Q 0 272 92 272
          L 1600 272
          L 1600 362
          L 0 362
          Z"
          fill="#4AA7EA"
        />

        <!-- PURPLE -->
        <rect x="0" y="376" width="1600" height="184" fill="#A56CC9"/>

        <!-- NOW draw the peach gaps ON TOP so they cannot disappear -->
        <rect x="0" y="70"  width="1600" height="14" fill="#D79A8A"/>
        <rect x="0" y="154" width="1600" height="14" fill="#D79A8A"/>
        <rect x="0" y="258" width="1600" height="14" fill="#D79A8A"/>
        <rect x="0" y="362" width="1600" height="14" fill="#D79A8A"/>

        <!-- tiny capture line above purple (DVD-ish, subtle) -->
        <rect x="0" y="376" width="1600" height="4" fill="#B86A91" opacity="0.22"/>
      </svg>

      <nav class="menu" aria-label="DVD Menu">
        <a class="item play" href="play.html">PLAY MOVIE</a>
        <a class="item lang" href="languages.html">LANGUAGES</a>
        <a class="item scene" href="scenes.html">SCENE SELECTIONS</a>
        <a class="item feat" href="features.html">SPECIAL FEATURES</a>
        <a class="item prev" href="previews.html">PREVIEWS</a>
      </nav>
    </section>

    <div class="grain" aria-hidden="true"></div>
  </main>

  <script src="menu.js?v=11"></script>
</body>
</html>
