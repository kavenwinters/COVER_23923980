<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="screen">

    <!-- Stripe stack anchored to bottom -->
    <section class="stripe-stack" aria-hidden="true">
      <!-- SVG draws ONLY the 4 colored bands with correct left bend -->
      <svg class="stripe-svg" viewBox="0 0 1600 400" preserveAspectRatio="none">
        <!-- band geometry uses real arcs so nothing turns into pointed lenses -->

        <!-- MAROON (y: 0..70) -->
        <path d="
          M 0 70
          A 140 140 0 0 1 140 0
          L 1600 0
          L 1600 70
          Z" fill="#8C3E63" />

        <!-- WHITE (y: 70..150) -->
        <path d="
          M 0 150
          A 160 160 0 0 1 160 70
          L 1600 70
          L 1600 150
          Z" fill="#D8D4D0" />

        <!-- GREEN (y: 150..260) -->
        <path d="
          M 0 260
          A 190 190 0 0 1 190 150
          L 1600 150
          L 1600 260
          Z" fill="#13978F" />

        <!-- BLUE (y: 260..400) -->
        <path d="
          M 0 400
          A 220 220 0 0 1 220 260
          L 1600 260
          L 1600 400
          Z" fill="#4BA5E8" />
      </svg>

      <!-- Thin peach separator (DVD has a tiny peach line here) -->
      <div class="peach-gap"></div>

      <!-- Purple bottom area -->
      <div class="purple"></div>
    </section>

    <!-- Menu locked to the 4 stripes (NO orange box) -->
    <nav class="menu" aria-label="DVD Menu">
      <a class="row play" href="play.html">PLAY MOVIE</a>
      <a class="row languages" href="languages.html">LANGUAGES</a>
      <a class="row scene" href="scenes.html">SCENE SELECTIONS</a>
      <a class="row features" href="features.html">SPECIAL FEATURES</a>
      <a class="row previews" href="previews.html">PREVIEWS</a>
    </nav>

    <div class="grain" aria-hidden="true"></div>

    <script src="script.js"></script>
  </main>
</body>
</html>
