<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superbad DVD Menu</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f36c00; /* Exact Superbad Background Orange */
      overflow: hidden; 
      font-family: 'Arial Black', Impact, sans-serif;
    }

    /* SVG Background */
    .bg-stripes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    /* Container for the menu buttons */
    .menu-item {
      position: absolute;
      right: 0;
      width: 50vw; 
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12vw; 
      z-index: 2;
    }

    .menu-item a {
      text-decoration: none;
      font-size: 3vh; 
      font-weight: 900;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      transform: translateX(0);
      transition: transform 0.1s linear; 
    }

    /* The DVD Cursor Box - Now Green to match the application theme */
    .menu-item a::after {
      content: '';
      display: inline-block;
      width: 1.5vh;
      height: 3vh;
      background-color: #179e40; 
      margin-left: 12px;
      opacity: 0; 
    }

    .menu-item a:hover {
      transform: translateX(-1.5vw); 
    }

    .menu-item a:hover::after {
      opacity: 1; 
    }

    /* Exact Text Colors */
    .text-white { color: #ffffff; }
    .text-blue  { color: #0d2459; }
    .text-purple{ color: #a65d9d; }
    .text-brown { color: #b56056; }
    .text-green { color: #6eb981; }

    .video-container {
      position: absolute;
      top: 15%;
      left: 20%;
      height: 60vh;
      z-index: 5;
    }

    /* Student ID Display for Compliance [cite: 56, 85] */
    .sid-display {
      position: absolute;
      top: 20px;
      right: 30px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.5vh;
      z-index: 10;
    }
  </style></head><body>

  <div class="sid-display">SID# [YOUR ID HERE]</div>

  <svg class="bg-stripes" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
    <path d="M 0,500 Q 300,800 400,800 L 1000,800 L 1000,1000 L 0,1000 Z" fill="#c93f8e"/>
    <g fill="none" stroke-width="50">
       <path d="M -50,325 Q 250,625 400,625 L 1050,625" stroke="#8c1025" />
       <path d="M -50,375 Q 250,675 400,675 L 1050,675" stroke="#e6d649" />
       <path d="M -50,425 Q 250,725 400,725 L 1050,725" stroke="#179e40" />
       <path d="M -50,475 Q 250,775 400,775 L 1050,775" stroke="#5eb4cd" />
       <path d="M -50,525 Q 250,825 400,825 L 1050,825" stroke="#c93f8e" />
    </g>
  </svg>

  <div class="menu-item" style="top: 60vh; height: 5vh;">
    <a href="play.html" class="text-white">PLAY MOVIE</a>
  </div>
  
  <div class="menu-item" style="top: 65vh; height: 5vh;">
    <a href="languages.html" class="text-blue">LANGUAGES</a>
  </div>
  
  <div class="menu-item" style="top: 70vh; height: 5vh;">
    <a href="backstory.html" class="text-purple">BACKSTORY</a>
  </div>
  
  <div class="menu-item" style="top: 75vh; height: 5vh;">
    <a href="features.html" class="text-brown">SPECIAL FEATURES</a>
  </div>
  
  <div class="menu-item" style="top: 80vh; height: 5vh;">
    <a href="previews.html" class="text-green">PREVIEWS</a>
  </div>

  <div class="video-container">
    </div></body></html>
