<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>
  <link rel="stylesheet" href="menu.css?v=9" />
</head>
<body>
  <main class="screen">

    <!-- Bottom stack -->
    <section class="stack" aria-hidden="true">
      <!-- One SVG draws EVERYTHING (peach bg + 4 stripes + purple) -->
      <svg class="art" viewBox="0 0 1600 520" preserveAspectRatio="none">
        <!-- base peach behind stripes -->
        <rect x="0" y="0" width="1600" height="520" fill="#D79A8A"/>

        <!-- Geometry notes (y):
             maroon:  0..70
             white:  70..150
             green: 150..260
             blue:  260..360
             purple:360..520
        -->

        <!-- MAROON (smooth left bend) -->
        <path d="
          M 0 32
          Q 60 0 210 0
          L 1600 0
          L 1600 70
          L 210 70
          Q 60 70 0 44
          Z"
          fill="#8C3E63"
        />

        <!-- WHITE -->
        <path d="
          M 0 92
          Q 70 70 230 70
          L 1600 70
          L 1600 150
          L 230 150
          Q 70 150 0 120
          Z"
          fill="#D8D4D0"
        />

        <!-- GREEN -->
        <path d="
          M 0 188
          Q 85 150 255 150
          L 1600 150
          L 1600 260
          L 255 260
          Q 85 260 0 228
          Z"
          fill="#15958C"
        />

        <!-- BLUE -->
        <path d="
          M 0 298
          Q 95 260 275 260
          L 1600 260
          L 1600 360
          L 0 360
          Z"
          fill="#4DA7EB"
        />

        <!-- very subtle line between blue and purple (DVD capture vibe) -->
        <rect x="0" y="360" width="1600" height="5" fill="#B86A91" opacity="0.35"/>

        <!-- PURPLE -->
        <rect x="0" y="365" width="1600" height="155" fill="#A768C8"/>
      </svg>

      <!-- Menu overlay locked to stripe heights -->
      <nav class="menu" aria-label="DVD Menu">
        <a class="item play" href="play.html">PLAY MOVIE</a>
        <a class="item lang" href="languages.html">LANGUAGES</a>
        <a class="item scene" href="scenes.html">SCENE SELECTIONS</a>
        <a class="item feat" href="features.html">SPECIAL FEATURES</a>
        <a class="item prev" href="previews.html">PREVIEWS</a>
      </nav>
    </section>

    <div class="grain" aria-hidden="true"></div>
  </main>

  <script src="menu.js?v=9"></script>
</body>
</html>
