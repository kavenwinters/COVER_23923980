<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="screen">

    <!-- background stripes -->
    <svg class="stripes" viewBox="0 0 1440 900" preserveAspectRatio="none" aria-hidden="true">
      <!-- maroon -->
      <path d="
        M 0 585
        Q 40 620 135 625
        L 1440 625
        L 1440 655
        L 135 655
        Q 40 650 0 615
        Z" fill="#8f3d66"/>

      <!-- white -->
      <path d="
        M 0 615
        Q 40 650 135 655
        L 1440 655
        L 1440 683
        L 135 683
        Q 40 678 0 645
        Z" fill="#d9d5d0"/>

      <!-- teal -->
      <path d="
        M 0 645
        Q 40 678 135 683
        L 1440 683
        L 1440 725
        L 135 725
        Q 40 720 0 687
        Z" fill="#14978f"/>

      <!-- blue -->
      <path d="
        M 0 687
        Q 40 720 135 725
        L 1440 725
        L 1440 765
        L 0 765
        Z" fill="#4da7eb"/>
    </svg>

    <!-- purple bottom strip -->
    <div class="purple-band" aria-hidden="true"></div>

    <!-- menu -->
    <nav class="menu" aria-label="DVD Menu">
      <a href="play.html" class="item play">PLAY MOVIE</a>
      <a href="languages.html" class="item languages">LANGUAGES</a>

      <div class="scene-row">
        <a href="scenes.html" class="item scene">SCENE SELECTIONS</a>
        <span class="scene-box"></span>
      </div>

      <a href="features.html" class="item features">SPECIAL FEATURES</a>
      <a href="previews.html" class="item previews">PREVIEWS</a>
    </nav>

    <!-- light texture -->
    <div class="grain" aria-hidden="true"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
