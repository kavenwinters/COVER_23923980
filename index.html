<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>
  <link rel="stylesheet" href="menu.css?v=10" />
</head>
<body>
  <main class="screen">

    <section class="stack" aria-hidden="true">
      <!-- One SVG draws: peach base + 4 bands + peach separators + purple -->
      <svg class="art" viewBox="0 0 1600 560" preserveAspectRatio="none">
        <!-- Peach base (DVD background) -->
        <rect x="0" y="0" width="1600" height="560" fill="#D89889"/>

        <!-- Layout (y):
          maroon  : 0..70
          gap     : 70..82
          white   : 82..152
          gap     : 152..164
          green   : 164..254
          gap     : 254..266
          blue    : 266..356
          gap     : 356..370  (peach strip above purple)
          purple  : 370..560
        -->

        <!-- Peach separators (explicit so you ALWAYS see them) -->
        <rect x="0" y="70"  width="1600" height="12" fill="#D89889"/>
        <rect x="0" y="152" width="1600" height="12" fill="#D89889"/>
        <rect x="0" y="254" width="1600" height="12" fill="#D89889"/>
        <rect x="0" y="356" width="1600" height="14" fill="#D89889"/>

        <!-- Bands: rounded-left “DVD bend” -->
        <!-- Helper: rounded-left band = round cap via quadratic corners -->

        <!-- MAROON (thin) -->
        <path d="
          M 0 70
          L 0 34
          Q 0 0 48 0
          L 1600 0
          L 1600 70
          L 48 70
          Q 0 70 0 34
          Z"
          fill="#8E3E63"
        />

        <!-- WHITE -->
        <path d="
          M 0 152
          L 0 118
          Q 0 82 56 82
          L 1600 82
          L 1600 152
          L 56 152
          Q 0 152 0 118
          Z"
          fill="#D9D4CF"
        />

        <!-- GREEN -->
        <path d="
          M 0 254
          L 0 210
          Q 0 164 70 164
          L 1600 164
          L 1600 254
          L 70 254
          Q 0 254 0 210
          Z"
          fill="#178F86"
        />

        <!-- BLUE -->
        <path d="
          M 0 356
          L 0 310
          Q 0 266 84 266
          L 1600 266
          L 1600 356
          L 0 356
          Z"
          fill="#4AA7EA"
        />

        <!-- Thin “capture line” between blue and purple (very subtle like DVD) -->
        <rect x="0" y="370" width="1600" height="4" fill="#B86A91" opacity="0.25"/>

        <!-- PURPLE -->
        <rect x="0" y="374" width="1600" height="186" fill="#A56CC9"/>
      </svg>

      <!-- Menu overlay locked to band heights -->
      <nav class="menu" aria-label="DVD Menu">
        <a class="item play" href="play.html">PLAY MOVIE</a>
        <a class="item lang" href="languages.html">LANGUAGES</a>
        <a class="item scene" href="scenes.html">SCENE SELECTIONS</a>
        <a class="item feat" href="features.html">SPECIAL FEATURES</a>
        <a class="item prev" href="previews.html">PREVIEWS</a>
      </nav>
    </section>

    <div class="grain" aria-hidden="true"></div>
  </main>

  <script src="menu.js?v=10"></script>
</body>
</html>
