<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superbad DVD Menu</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f36c00; /* Exact Superbad Background Orange */
      overflow: hidden; 
      font-family: 'Arial Black', Impact, sans-serif;
    }

    /* SVG Background - Layer 1 */
    .bg-stripes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    /* The Dancer Video - Horizontal Adjustment */
    #dancer-video {
      position: absolute;
      bottom: 5vh;      /* Keeps the vertical level exactly where it is */
      left: 28vw;      /* Pushed right (was 8vw) to sit closer to the text */
      width: 48vw;      
      height: 90vh;     
      object-fit: contain; 
      z-index: 2; 
      mix-blend-mode: multiply; 
      pointer-events: none; 
      animation: fadeIn 1.2s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Container for the menu buttons - Layer 3 */
    .menu-item {
      position: absolute;
      right: 0;
      width: 50vw; 
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 12vw; 
      z-index: 3;
    }

    .menu-item a {
      text-decoration: none;
      font-size: 3vh; 
      font-weight: 900;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      transform: translateX(0);
      transition: transform 0.1s linear; 
    }

      content: '';
      display: inline-block;
      width: 1.5vh;
      height: 3vh;
      background-color: #f36c00; 
      margin-left: 1
