<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="screen">
    <!-- colored bands -->
    <svg class="bands" viewBox="0 0 1440 900" preserveAspectRatio="none" aria-hidden="true">
      <!-- maroon -->
      <path
        d="M0,560
           Q35,600 135,610
           L1440,610
           L1440,650
           L135,650
           Q35,642 0,607
           Z"
        fill="#8c3e63"
      />

      <!-- white -->
      <path
        d="M0,607
           Q35,642 135,650
           L1440,650
           L1440,685
           L135,685
           Q35,677 0,645
           Z"
        fill="#d8d4d0"
      />

      <!-- green -->
      <path
        d="M0,645
           Q35,677 135,685
           L1440,685
           L1440,735
           L135,735
           Q35,727 0,695
           Z"
        fill="#13978f"
      />

      <!-- blue -->
      <path
        d="M0,695
           Q35,727 135,735
           L1440,735
           L1440,780
           L0,780
           Z"
        fill="#4ba5e8"
      />
    </svg>

    <!-- purple band -->
    <div class="purple-band" aria-hidden="true"></div>

    <!-- menu -->
    <nav class="menu" aria-label="DVD Menu">
      <a href="play.html" class="menu-item play">PLAY MOVIE</a>
      <a href="languages.html" class="menu-item languages">LANGUAGES</a>

      <div class="scene-row">
        <a href="scenes.html" class="menu-item scene">SCENE SELECTIONS</a>
        <span class="scene-box" aria-hidden="true"></span>
      </div>

      <a href="features.html" class="menu-item features">SPECIAL FEATURES</a>
      <a href="previews.html" class="menu-item previews">PREVIEWS</a>
    </nav>

    <div class="grain" aria-hidden="true"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
