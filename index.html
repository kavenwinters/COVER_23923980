<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="screen">
    <!-- Stripe stack anchored to the bottom -->
    <section class="stripe-stack" aria-hidden="true">
      <!-- 4 equal-height stripes + left curve -->
      <svg class="stripe-svg" viewBox="0 0 1600 400" preserveAspectRatio="none">
        <!-- MAROON -->
        <path
          d="M0,0
             Q70,55 190,72
             L1600,72
             L1600,100
             L190,100
             Q70,100 0,72
             Z"
          fill="#8c3e63"
        />

        <!-- WHITE -->
        <path
          d="M0,72
             Q70,100 190,100
             L1600,100
             L1600,200
             L190,200
             Q70,200 0,160
             Z"
          fill="#d8d4d0"
        />

        <!-- GREEN -->
        <path
          d="M0,160
             Q70,200 190,200
             L1600,200
             L1600,300
             L190,300
             Q70,300 0,250
             Z"
          fill="#13978f"
        />

        <!-- BLUE -->
        <path
          d="M0,250
             Q70,300 190,300
             L1600,300
             L1600,400
             L0,400
             Z"
          fill="#4ba5e8"
        />
      </svg>

      <!-- Purple below -->
      <div class="purple"></div>
    </section>

    <!-- Menu locked into the 4 stripes (no orange block) -->
    <nav class="menu" aria-label="DVD Menu">
      <a href="play.html" class="row play">PLAY MOVIE</a>
      <a href="languages.html" class="row languages">LANGUAGES</a>
      <a href="scenes.html" class="row scene">SCENE SELECTIONS</a>
      <a href="features.html" class="row features">SPECIAL FEATURES</a>
      <a href="previews.html" class="row previews">PREVIEWS</a>
    </nav>

    <div class="grain" aria-hidden="true"></div>

    <script src="script.js"></script>
  </main>
</body>
</html>
