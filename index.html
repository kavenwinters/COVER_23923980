<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Superbad Menu (Web)</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="stage" aria-label="DVD Menu">
      <!-- Bottom bands (SVG for the left bend) -->
      <div class="bands" aria-hidden="true">
        <svg class="bands-svg" viewBox="0 0 1000 340" preserveAspectRatio="none">
          <!-- Peach base behind the bands is the page background -->

          <!-- Burgundy band -->
          <path
            d="M0,58
               Q40,88 135,88
               L1000,88
               L1000,125
               L135,125
               Q40,125 0,92
               Z"
            fill="var(--burgundy)"
          />

          <!-- Cream band -->
          <path
            d="M0,125
               Q42,155 140,155
               L1000,155
               L1000,190
               L140,190
               Q42,190 0,160
               Z"
            fill="var(--cream)"
          />

          <!-- Green band -->
          <path
            d="M0,190
               Q44,220 146,220
               L1000,220
               L1000,270
               L146,270
               Q44,270 0,236
               Z"
            fill="var(--green)"
          />

          <!-- Light blue band -->
          <path
            d="M0,270
               Q44,300 150,300
               L1000,300
               L1000,340
               L0,340
               Z"
            fill="var(--ltblue)"
          />
        </svg>

        <!-- Purple area under the light blue band -->
        <div class="purple-floor"></div>
      </div>

      <!-- Clickable menu (positioned on top of the bands) -->
      <nav class="menu" aria-label="Menu">
        <a class="menu-item is-highlight" href="play.html" data-row="0">PLAY MOVIE</a>
        <a class="menu-item is-blue" href="languages.html" data-row="1">LANGUAGES</a>
        <div class="menu-row scene-row">
          <a class="menu-item is-soft" href="scenes.html" data-row="2">SCENE SELECTIONS</a>
          <span class="scene-indicator" aria-hidden="true"></span>
        </div>
        <a class="menu-item is-soft" href="features.html" data-row="3">SPECIAL FEATURES</a>
        <a class="menu-item is-soft is-dim" href="previews.html" data-row="4">PREVIEWS</a>
      </nav>

      <!-- Subtle “DVD noise” overlay to feel like the screenshot -->
      <div class="noise" aria-hidden="true"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
