<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="screen">

    <!-- Bottom stripe stack -->
    <section class="stripe-stack" aria-hidden="true">
      <svg class="stripe-svg" viewBox="0 0 1600 400" preserveAspectRatio="none">
        <!-- MAROON -->
        <path
          d="M0,0
             Q95,70 240,86
             L1600,86
             L1600,110
             L240,110
             Q95,110 0,86
             Z"
          fill="#8c3e63"
        />

        <!-- WHITE -->
        <path
          d="M0,86
             Q95,110 240,110
             L1600,110
             L1600,210
             L240,210
             Q95,210 0,170
             Z"
          fill="#d8d4d0"
        />

        <!-- GREEN -->
        <path
          d="M0,170
             Q95,210 240,210
             L1600,210
             L1600,310
             L240,310
             Q95,310 0,265
             Z"
          fill="#13978f"
        />

        <!-- BLUE -->
        <path
          d="M0,265
             Q95,310 240,310
             L1600,310
             L1600,400
             L0,400
             Z"
          fill="#4ba5e8"
        />
      </svg>

      <!-- tiny peach divider like the DVD -->
      <div class="peach-gap"></div>

      <!-- purple area -->
      <div class="purple"></div>
    </section>

    <!-- Menu locked into stripes (orange block removed) -->
    <nav class="menu" aria-label="DVD Menu">
      <a href="play.html" class="row play">PLAY MOVIE</a>
      <a href="languages.html" class="row languages">LANGUAGES</a>
      <a href="scenes.html" class="row scene">SCENE SELECTIONS</a>
      <a href="features.html" class="row features">SPECIAL FEATURES</a>
      <a href="previews.html" class="row previews">PREVIEWS</a>
    </nav>

    <div class="grain" aria-hidden="true"></div>

    <script src="script.js"></script>
  </main>
</body>
</html>
