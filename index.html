<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Superbad DVD Menu</title>

  <!-- NEW filename to beat GitHub Pages cache -->
  <link rel="stylesheet" href="menu.css?v=7" />
</head>
<body>
  <main class="screen">

    <!-- Bottom stack scales together -->
    <section class="stack" aria-hidden="true">
      <!-- One SVG contains ALL bands including purple + thin separator -->
      <svg class="bands" viewBox="0 0 1600 520" preserveAspectRatio="none">
        <!-- Background of stack area (peach) -->
        <rect x="0" y="0" width="1600" height="520" fill="#D79788"/>

        <!-- MAROON (thin) -->
        <path d="
          M 0 95
          Q 90 10 280 0
          L 1600 0
          L 1600 95
          L 280 95
          Q 90 110 0 95
          Z" fill="#8C3E63"/>

        <!-- WHITE -->
        <path d="
          M 0 205
          Q 105 115 305 95
          L 1600 95
          L 1600 205
          L 305 205
          Q 105 225 0 205
          Z" fill="#D8D4D0"/>

        <!-- GREEN (thicker) -->
        <path d="
          M 0 330
          Q 120 230 340 205
          L 1600 205
          L 1600 330
          L 340 330
          Q 120 352 0 330
          Z" fill="#13978F"/>

        <!-- BLUE (thicker) -->
        <path d="
          M 0 440
          Q 130 360 365 330
          L 1600 330
          L 1600 440
          L 0 440
          Z" fill="#4BA5E8"/>

        <!-- Thin capture line between blue & purple (DVD look) -->
        <rect x="0" y="440" width="1600" height="7" fill="#B86A91" opacity="0.55"/>

        <!-- PURPLE bottom -->
        <rect x="0" y="447" width="1600" height="73" fill="#A768C8"/>
      </svg>

      <!-- Menu overlay locked to bands via grid -->
      <nav class="menu" aria-label="DVD Menu">
        <a class="item play" href="play.html">PLAY MOVIE</a>
        <a class="item lang" href="languages.html">LANGUAGES</a>
        <a class="item scene" href="scenes.html">SCENE SELECTIONS</a>
        <a class="item feat" href="features.html">SPECIAL FEATURES</a>
        <a class="item prev" href="previews.html">PREVIEWS</a>
      </nav>
    </section>

    <div class="grain" aria-hidden="true"></div>
  </main>

  <!-- NEW filename to beat cache -->
  <script src="menu.js?v=7"></script>
</body>
</html>
