<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superbad DVD Menu</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f36c00; /* Superbad Orange */
      overflow: hidden; 
      font-family: 'Arial Black', Impact, sans-serif;
    }

    /* Student ID for Links Application Compliance */
    .sid-display {
      position: absolute;
      top: 20px;
      right: 30px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.8vh;
      font-weight: 900;
      z-index: 10;
      letter-spacing: 1px;
    }

    /* Background Stripes */
    .bg-stripes {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    /* Menu Container */
    .menu-container {
      position: absolute;
      top: 60vh;
      right: 0;
      width: 50vw;
      display: flex;
      flex-direction: column;
      gap: 1.2vh;
      padding-right: 12vw;
      z-index: 5;
    }

    .menu-item a {
      text-decoration: none;
      font-size: 3.2vh; 
      font-weight: 900;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      transform: translateX(0);
      transition: transform 0.1s linear; 
    }

    /* The Orange DVD Cursor Box */
    .menu-item a::after {
      content: '';
      display: inline-block;
      width: 1.6vh;
      height: 3.2vh;
      background-color: #f36c00; 
      margin-left: 15px;
      opacity: 0; 
    }

    .menu-item a:hover {
      transform: translateX(-1.5vw); 
    }

    .menu-item a:hover::after {
      opacity: 1; 
    }

    /* Exact Text Colors from the Menu */
    .text-white { color: #ffffff !important; }
    .text-blue  { color: #0b2158 !important; }
    .text-purple{ color: #8e44ad !important; }
    .text-brown { color: #784212 !important; }
    .text-green { color: #145a32 !important; }

    .video-container {
      position: absolute;
      top: 15%;
      left: 20%;
      height: 60vh;
      width: 30vw;
      z-index: 2;
    }
  </style>
</head>
<body>
