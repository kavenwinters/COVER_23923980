<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Superbad DVD Menu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage">
      <!-- background bands -->
      <div class="bands-wrap" aria-hidden="true">
        <svg
          class="bands-svg"
          viewBox="0 0 1600 420"
          preserveAspectRatio="none"
        >
          <!-- maroon -->
          <path
            d="M0,130
               Q55,170 150,178
               L1600,178
               L1600,208
               L150,208
               Q52,202 0,166
               Z"
            fill="#8e3f63"
          />

          <!-- white -->
          <path
            d="M0,166
               Q55,202 150,208
               L1600,208
               L1600,236
               L150,236
               Q52,230 0,196
               Z"
            fill="#ddd8d3"
          />

          <!-- teal/green -->
          <path
            d="M0,196
               Q55,230 150,236
               L1600,236
               L1600,278
               L150,278
               Q52,272 0,240
               Z"
            fill="#15958c"
          />

          <!-- blue -->
          <path
            d="M0,240
               Q55,272 150,278
               L1600,278
               L1600,318
               L0,318
               Z"
            fill="#4aa7ea"
          />
        </svg>

        <div class="purple-band"></div>
      </div>

      <!-- menu aligned to stripe centers -->
      <nav class="menu" aria-label="DVD Menu">
        <a href="play.html" class="menu-link play">PLAY MOVIE</a>
        <a href="languages.html" class="menu-link languages">LANGUAGES</a>

        <div class="scene-line">
          <a href="scenes.html" class="menu-link scene">SCENE SELECTIONS</a>
          <span class="scene-indicator"></span>
        </div>

        <a href="features.html" class="menu-link features">SPECIAL FEATURES</a>
        <a href="previews.html" class="menu-link previews">PREVIEWS</a>
      </nav>

      <div class="noise"></div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
