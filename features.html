<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Special Features</title>
  <style>
    * { box-sizing: border-box; }
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background-color: #c93f8e; /* Base Pink */
      overflow: hidden; 
      font-family: 'Arial Black', Impact, sans-serif; 
    }
    
    .bg-stripes { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100vw; 
      height: 100vh; 
      z-index: 1; 
    }
    
    /* Text styling removed for a clean layout */
  </style>
</head>
<body>
  
  <svg class="bg-stripes" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
    
    <rect width="1000" height="1000" fill="#c93f8e" />

    <rect x="0" y="0" width="450" height="700" fill="#8c1025" />

    <rect x="0" y="700" width="450" height="26" fill="#e6d649" />
    <rect x="0" y="726" width="450" height="26" fill="#179e40" />
    <rect x="0" y="752" width="450" height="26" fill="#5eb4cd" />

    <path d="M 450,0 
             L 880,0 
             L 880,600 
             A 500 500 0 0 1 380,1100 
             L 0,1100 
             L 300,1000 
             L 420,840 
             Q 450,800 450,778 
             L 450,0 Z" 
          fill="#179e40"/>

    <path d="M 932,0 L 932,600 A 552 552 0 0 1 380,1152" fill="none" stroke="#5eb4cd" stroke-width="26" />

  </svg>

  </body>
</html>
