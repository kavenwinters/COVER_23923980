<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Director's Cut</title>
  <style>
    * { box-sizing: border-box; }
    body, html { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      background-color: #f36c00; /* Exact Superbad Background Orange */
      overflow: hidden; 
      font-family: 'Arial Black', Impact, sans-serif; 
    }
    
    /* Horizontal stripes hugging the bottom */
    .bg-stripes { 
      position: absolute; 
      bottom: 0; 
      left: 0; 
      width: 100vw; 
      height: 12vh; 
      z-index: 1; 
      display: flex; 
      flex-direction: column; 
    }
    .stripe { width: 100%; flex: 1; }
    .stripe-darkred { background-color: #8c1025; }
    .stripe-yellow { background-color: #e6d649; flex: 2.5; }
    .stripe-green { background-color: #179e40; }
    .stripe-blue { background-color: #5eb4cd; }
    .stripe-pink { background-color: #c93f8e; }
    
    /* Navigation buttons sitting above the stripes */
    .nav-buttons { 
      position: absolute; 
      bottom: 16vh; 
      left: 10vw; 
      z-index: 2; 
      display: flex; 
      flex-direction: row; 
      gap: 4vw; 
    }
    
    .nav-buttons a { 
      text-decoration: none; 
      font-size: 3vh; 
      font-weight: 900; 
      letter-spacing: 2px; 
      color: #ffffff; /* White to match the 'Director's Cut' index color */
      transition: transform 0.1s linear; 
      display: flex; 
      align-items: center; 
    }
    
    /* White hover box logic */
    .nav-buttons a::before { 
      content: ''; 
      display: inline-block; 
      width: 1.5vh; 
      height: 3vh; 
      background-color: #ffffff; 
      margin-right: 12px; 
      opacity: 0; 
    }
    
    .nav-buttons a:hover { transform: translateY(-5px); }
    .nav-buttons a:hover::before { opacity: 1; }

    /* Content Area */
    .content-area {
      position: absolute;
      top: 15vh;
      left: 10vw;
      width: 80vw;
      z-index: 2;
    }

      font-size: 8vh;
      margin: 0;
      line-height: 0.85;
