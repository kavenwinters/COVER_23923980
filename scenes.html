<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Selections</title>
  <style>
    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #8c1025; overflow: hidden; font-family: 'Arial Black', Impact, sans-serif; }
    
    /* Builds the straight horizontal stripes at the bottom */
    .bg-stripes { position: absolute; bottom: 0; left: 0; width: 100vw; height: 12vh; z-index: 1; display: flex; flex-direction: column; }
    .stripe { width: 100%; flex: 1; }
    .stripe-yellow { background-color: #e6d649; flex: 2.5; /* Made thicker to match your image */ }
    .stripe-green { background-color: #179e40; }
    .stripe-blue { background-color: #5eb4cd; }
    .stripe-pink { background-color: #c93f8e; }
    
    /* Adjusted button position so they sit cleanly above the stripes */
    .nav-buttons { position: absolute; bottom: 16vh; left: 10vw; z-index: 2; display: flex; flex-direction: row; gap: 4vw; }
    .nav-buttons a { text-decoration: none; font-size: 3vh; font-weight: 900; letter-spacing: 2px; color: #6eb981; transition: transform 0.1s linear; display: flex; align-items: center; }
    
    .nav-buttons a::before { content: ''; display: inline-block; width: 1.5vh; height: 3vh; background-color: #6eb981; margin-right: 12px; opacity: 0; }
    /* Snaps up slightly instead of right, since these are laid out horizontally */
    .nav-buttons a:hover { transform: translateY(-5px); }
    .nav-buttons a:hover::before { opacity: 1; }
  </style>
</head>
<body>
  
  <div class="bg-stripes">
    <div class="stripe stripe-yellow"></div>
    <div class="stripe stripe-green"></div>
    <div class="stripe stripe-blue"></div>
    <div class="stripe stripe-pink"></div>
  </div>

  <div class="nav-buttons">
    <a href="play.html">PLAY MOVIE</a>
    <a href="index.html">MAIN MENU</a>
  </div>
</body>
</html>
